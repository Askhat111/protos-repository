syntax = "proto3";

package service.frontend.client.v1;

option go_package = "github.com/Askhat111/converted-proto/service/frontend/client/v1";

import "base/frontend/v1/client.proto";

service PaymentService {
  rpc ProcessPayment (base.frontend.v1.PaymentRequest) returns (base.frontend.v1.PaymentResponse);
}

service OrderTrackingService {
  rpc SubscribeToOrderUpdates (base.frontend.v1.OrderRequest) returns (stream base.frontend.v1.OrderStatusUpdate);
}